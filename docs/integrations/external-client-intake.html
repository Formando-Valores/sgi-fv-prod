<div id="sgi-external-form-wrap" style="max-width:720px;margin:0 auto;padding:20px;background:#fff;border:1px solid #e5e7eb;border-radius:12px;font-family:Arial,sans-serif;">
  <h2 style="margin:0 0 12px;color:#0f172a;">Cadastro do Cliente</h2>
  <p style="margin:0 0 20px;color:#475569;font-size:14px;">
    Preencha os dados para criar seu acesso na plataforma SGI-FV a partir deste site/portal.
  </p>

  <form id="sgiExternalForm" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
    <div style="grid-column:1 / -1;">
      <label>Nome completo</label>
      <input name="fullName" required style="width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:8px;" />
    </div>

    <div style="grid-column:1 / -1;">
      <label>E-mail</label>
      <input type="email" name="email" required style="width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:8px;" />
    </div>

    <div>
      <label>Senha</label>
      <input type="password" id="passwordField" name="password" required style="width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:8px;" />
      <ul id="passwordRules" style="list-style:none;padding:4px 0 0;margin:4px 0 0;font-size:12px;color:#64748b;display:none;">
        <li id="ruleLength">✗ Mínimo 8 caracteres</li>
        <li id="ruleUpper">✗ Uma letra maiúscula</li>
        <li id="ruleNumber">✗ Um número</li>
        <li id="ruleSpecial">✗ Um caractere especial (!@#$%^&*(),.?":{}|&lt;&gt;)</li>
      </ul>
    </div>

    <div>
      <label>Confirmar senha</label>
      <input type="password" id="confirmPasswordField" name="confirmPassword" required style="width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:8px;" />
      <p id="confirmMatch" style="margin:4px 0 0;font-size:12px;color:#64748b;"></p>
    </div>

    <div>
      <label>Documento de identidade</label>
      <input name="documentId" style="width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:8px;" />
    </div>

    <div>
      <label>NIF / CPF</label>
      <input name="taxId" style="width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:8px;" />
    </div>

    <div>
      <label>Telefone</label>
      <input name="phone" style="width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:8px;" />
    </div>

    <div>
      <label>Estado civil</label>
      <select name="maritalStatus" style="width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:8px;">
        <option>Solteiro</option>
        <option>Casado</option>
        <option>Divorciado</option>
        <option>Viúvo</option>
      </select>
    </div>

    <div>
      <label>País</label>
      <input name="country" value="Brasil" style="width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:8px;" />
    </div>

    <div>
      <label>Título do processo (opcional)</label>
      <input name="processTitle" placeholder="Ex.: Solicitação inicial" style="width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:8px;" />
    </div>

    <div style="grid-column:1 / -1;">
      <label>Endereço</label>
      <input name="address" style="width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:8px;" />
    </div>

    <div style="grid-column:1 / -1;">
      <label>Nome da organização para cadastro futuro</label>
      <input name="organizationRequestedName" placeholder="Ex.: Associação XPTO" style="width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:8px;" />
    </div>

    <div style="grid-column:1 / -1;">
      <label>Área de atendimento</label>
      <div style="display:grid;grid-template-columns:repeat(3, minmax(0,1fr));gap:8px;margin-top:8px;">
        <label style="border:1px solid #cbd5e1;border-radius:8px;padding:10px;display:flex;gap:8px;align-items:center;justify-content:center;">
          <input type="radio" name="serviceUnit" value="JURÍDICO / ADVOCACIA" checked />
          JURÍDICO / ADVOCACIA
        </label>
        <label style="border:1px solid #cbd5e1;border-radius:8px;padding:10px;display:flex;gap:8px;align-items:center;justify-content:center;">
          <input type="radio" name="serviceUnit" value="ADMINISTRATIVO" />
          ADMINISTRATIVO
        </label>
        <label style="border:1px solid #cbd5e1;border-radius:8px;padding:10px;display:flex;gap:8px;align-items:center;justify-content:center;">
          <input type="radio" name="serviceUnit" value="TECNOLÓGICO / AI" />
          TECNOLÓGICO / AI
        </label>
      </div>
    </div>

    <div style="grid-column:1 / -1;display:flex;align-items:center;gap:8px;">
      <input id="consentExternal" type="checkbox" required />
      <label for="consentExternal" style="font-size:13px;color:#334155;">Autorizo o cadastro dos meus dados para acesso à plataforma.</label>
    </div>

    <button type="submit" style="grid-column:1 / -1;background:#1d4ed8;color:white;border:none;padding:12px 16px;border-radius:10px;font-weight:bold;cursor:pointer;">
      Criar meu acesso
    </button>

    <div id="sgiExternalMessage" style="grid-column:1 / -1;font-size:14px;"></div>
  </form>
</div>

<script>
  (function () {
    const SUPABASE_URL = `https://SEU_PROJECT_REF.supabase.co`.trim();
    const ENDPOINT = `${SUPABASE_URL.replace(/\/$/, "")}/functions/v1/wix-client-intake`;
    const API_KEY = `SUA_CHAVE_PRIVADA_DA_INTEGRACAO`.trim();
    const SUPABASE_ANON_KEY = `SUA_SUPABASE_ANON_KEY`.trim();

    const INTEGRATION_SOURCE = `portal-parceiro`.trim();
    const INTEGRATION_SITE_NAME = `Portal Parceiro XPTO`.trim();
    const DEFAULT_ORGANIZATION_SLUG = `default`.trim();

    const form = document.getElementById("sgiExternalForm");
    const message = document.getElementById("sgiExternalMessage");
    const passwordField = document.getElementById("passwordField");
    const confirmField = document.getElementById("confirmPasswordField");
    const ruleLength = document.getElementById("ruleLength");
    const ruleUpper = document.getElementById("ruleUpper");
    const ruleNumber = document.getElementById("ruleNumber");
    const ruleSpecial = document.getElementById("ruleSpecial");
    const confirmMatch = document.getElementById("confirmMatch");

    const setMessage = (text, ok) => {
      message.textContent = text;
      message.style.color = ok ? "#166534" : "#b91c1c";
    };

    const checkPassword = () => {
      const val = passwordField.value;
      const hasLength = val.length >= 8;
      const hasUpper = /[A-Z]/.test(val);
      const hasNumber = /[0-9]/.test(val);
      const hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(val);
      const rules = document.getElementById("passwordRules");
      rules.style.display = val.length > 0 || passwordField === document.activeElement ? "block" : "none";
      ruleLength.textContent = (hasLength ? "\u2713" : "\u2717") + " M\u00ednimo 8 caracteres";
      ruleLength.style.color = hasLength ? "#166534" : "#b91c1c";
      ruleUpper.textContent = (hasUpper ? "\u2713" : "\u2717") + " Uma letra mai\u00fascula";
      ruleUpper.style.color = hasUpper ? "#166534" : "#b91c1c";
      ruleNumber.textContent = (hasNumber ? "\u2713" : "\u2717") + " Um n\u00famero";
      ruleNumber.style.color = hasNumber ? "#166534" : "#b91c1c";
      ruleSpecial.textContent = (hasSpecial ? "\u2713" : "\u2717") + " Um caractere especial (!@#$%^&*(),.?\":{}|&lt;&gt;)";
      ruleSpecial.style.color = hasSpecial ? "#166534" : "#b91c1c";
      return hasLength && hasUpper && hasNumber && hasSpecial;
    };

    const checkConfirm = () => {
      if (!confirmField.value) {
        confirmMatch.textContent = "";
        return;
      }
      confirmMatch.textContent = passwordField.value === confirmField.value ? "\u2713 Senhas coincidem" : "\u2717 Senhas n\u00e3o coincidem";
      confirmMatch.style.color = passwordField.value === confirmField.value ? "#166534" : "#b91c1c";
    };

    const showRules = () => { document.getElementById("passwordRules").style.display = "block"; };
    const hideRules = () => {
      if (!passwordField.value) document.getElementById("passwordRules").style.display = "none";
    };

    passwordField.addEventListener("focus", function () { showRules(); checkPassword(); });
    passwordField.addEventListener("blur", hideRules);
    passwordField.addEventListener("input", function () {
      checkPassword();
      if (confirmField.value) checkConfirm();
    });
    confirmField.addEventListener("input", checkConfirm);

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      if (!checkPassword()) {
        setMessage("A senha deve ter 8 caracteres, uma letra maiúscula, um caractere especial e um número.", false);
        return;
      }

      if (passwordField.value !== confirmField.value) {
        setMessage("As senhas não coincidem.", false);
        return;
      }

      const consentCheckboxExternal = document.getElementById("consentExternal");
      const data = new FormData(form);
      const payload = {
        organizationSlug: DEFAULT_ORGANIZATION_SLUG || "default",
        source: INTEGRATION_SOURCE || "site-externo",
        siteName: INTEGRATION_SITE_NAME || "Site Externo",
        fullName: data.get("fullName") || "",
        email: data.get("email") || "",
        password: data.get("password") || "",
        confirmPassword: data.get("confirmPassword") || "",
        documentId: data.get("documentId") || "",
        taxId: data.get("taxId") || "",
        address: data.get("address") || "",
        maritalStatus: data.get("maritalStatus") || "Solteiro",
        country: data.get("country") || "Brasil",
        phone: data.get("phone") || "",
        processTitle: data.get("processTitle") || "",
        serviceUnit: data.get("serviceUnit") || "JURÍDICO / ADVOCACIA",
        organizationRequestedName: data.get("organizationRequestedName") || "",
        consentPrivacyPolicy: consentCheckboxExternal ? consentCheckboxExternal.checked : false
      };

      setMessage("Enviando cadastro...", true);

      try {
        const response = await fetch(ENDPOINT, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
            "x-api-key": API_KEY
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (!response.ok || !result.success) {
          setMessage(result.error || "Não foi possível concluir o cadastro.", false);
          return;
        }

        setMessage("Cadastro realizado com sucesso! O sistema registrou a origem e o nome deste site/portal.", true);
        form.reset();
      } catch (error) {
        console.error("Falha ao chamar wix-client-intake", { endpoint: ENDPOINT, error });
        setMessage("Erro de conexão ao enviar cadastro.", false);
      }
    });
  })();
</script>
